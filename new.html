<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Quiz Game</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: auto; padding: 20px; }
    .question-box { margin-bottom: 20px; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <h1>Quiz Game</h1>
  <div id="quiz-container"></div>
  <button id="submit-btn">Submit</button>
  <div id="result"></div>

  <script>
    const questions = [
      { question: "What is the capital of France?", options: ["Paris", "London", "Rome", "Berlin"], answer: 0 },
      { question: "What is 5 + 3?", options: ["10", "8", "7", "9"], answer: 1 },
      { question: "Who wrote 'Hamlet'?", options: ["Charles Dickens", "Jane Austen", "William Shakespeare", "Mark Twain"], answer: 2 },
      { question: "What planet is known as the Red Planet?", options: ["Earth", "Mars", "Venus", "Jupiter"], answer: 1 },
      { question: "Which language is used to build Android apps?", options: ["Java", "Python", "C#", "Swift"], answer: 0 },
      { question: "What is the square root of 64?", options: ["6", "7", "8", "9"], answer: 2 }
    ];

    const quizContainer = document.getElementById("quiz-container");

    questions.forEach((q, idx) => {
      const box = document.createElement("div");
      box.classList.add("question-box");
      box.innerHTML = `<p><strong>${idx + 1}. ${q.question}</strong></p>`;
      q.options.forEach((opt, i) => {
        box.innerHTML += `
          <label>
            <input type="radio" name="q${idx}" value="${i}" />
            ${opt}
          </label><br/>
        `;
      });
      quizContainer.appendChild(box);
    });

    document.getElementById("submit-btn").onclick = function () {
      let score = 0;
      questions.forEach((q, idx) => {
        const selected = document.querySelector(`input[name="q${idx}"]:checked`);
        if (selected && parseInt(selected.value) === q.answer) {
          score++;
        }
      });
      document.getElementById("result").innerHTML = `
        <h2>Quiz Over!</h2>
        <p>Your score: ${score} / ${questions.length}</p>
        <p>Percentage: ${(score / questions.length * 100).toFixed(2)}%</p>
      `;
    };
  </script>
</body>
</html>
